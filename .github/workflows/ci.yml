name: Visual Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back_end
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
    - name: Go Format Check
      run: if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then exit 1; fi
    - name: Go Vet
      run: go vet ./...
    - name: Run Tests
      run: go test -v ./...
    - name: Build Check
      run: go build -v ./...

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_end
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: front_end/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: TypeScript Check
      run: npx tsc --noEmit
    - name: Build Check
      run: npm run build
