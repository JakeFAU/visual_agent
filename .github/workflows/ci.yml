name: Visual Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back_end
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: back_end/go.sum
      - name: Go Vet
        run: go vet ./...
      - name: Run Tests
        run: go test -v ./...
      - name: Build Check
        run: go build -v ./...

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_end
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: front_end/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: TypeScript Check
        run: npm run typecheck
      - name: Build Check
        run: npm run build
